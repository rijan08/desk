<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>desk — a small shelf of documents</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f3ede0;
    --bg2:#ece4d3;
    --card:#ece4d3;
    --card2:#e4dac4;
    --line:#d8cdb6;
    --line2:#c3b596;
    --ink:#1a1712;
    --ink-dim:#3b3528;
    --ink-faint:#7a6f5c;
    --amber:#c2451d;
    --teal:#1c5e60;
    --rose:#a31515;
    --violet:#9b3414;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --sans:'IBM Plex Sans',system-ui,sans-serif;
    --serif:'Fraunces',Georgia,serif;
    --maxw:920px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;background:var(--bg);color:var(--ink);
    font-family:var(--sans);font-size:16px;line-height:1.62;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(circle at 1px 1px, rgba(120,105,75,.18) 1px, transparent 0);
    background-size:26px 26px;
    background-attachment:fixed;
  }
  a{color:var(--violet);text-decoration:none;transition:.15s;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;}

  /* hero */
  .hero{padding:74px 0 30px;border-bottom:2px solid var(--ink);margin-bottom:8px;
    background:linear-gradient(180deg, rgba(194,69,29,.05), transparent);}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--amber);margin-bottom:16px;}
  h1{font-family:var(--serif);font-weight:700;font-size:clamp(40px,8vw,72px);line-height:1;margin:0 0 18px;letter-spacing:-1px;}
  h1 em{font-style:italic;color:var(--amber);}
  .lede{font-size:17px;color:var(--ink-dim);max-width:560px;}
  .lede b{color:var(--ink);font-weight:600;}

  /* controls */
  .controls{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin:26px 0 6px;padding:14px 0;
    position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent);}
  .search{flex:1;min-width:220px;display:flex;align-items:center;gap:10px;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;}
  .search:focus-within{border-color:var(--line2);}
  .search svg{flex-shrink:0;opacity:.6;}
  #filter{flex:1;background:none;border:none;outline:none;color:var(--ink);font-family:var(--sans);font-size:15px;}
  #filter::placeholder{color:var(--ink-faint);}
  .count{font-family:var(--mono);font-size:12px;letter-spacing:.5px;color:var(--ink-faint);white-space:nowrap;}
  .count b{color:var(--teal);}

  /* card grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;margin-top:26px;}
  .card{display:flex;flex-direction:column;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:18px;transition:border-color .15s,background .15s;}
  .card:hover{border-color:var(--line2);background:var(--card2);}
  .card .ctag{align-self:flex-start;font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;
    color:var(--accent,var(--teal));background:var(--bg2);border:1px solid var(--line2);
    padding:2px 8px;border-radius:20px;margin-bottom:12px;}
  .card h3{font-family:var(--serif);font-weight:600;font-size:19px;line-height:1.2;margin:0 0 8px;color:var(--ink);letter-spacing:-.2px;}
  .card p{font-size:13.5px;color:var(--ink-dim);margin:0;line-height:1.5;}

  #noresults{display:none;text-align:center;font-family:var(--mono);font-size:13px;color:var(--ink-faint);padding:50px 0;}

  .footer{margin:70px 0 60px;font-family:var(--mono);font-size:11px;color:var(--ink-faint);text-align:center;letter-spacing:.5px;}
  .footer a{color:var(--ink-faint);border-bottom:1px solid var(--line);}
  .footer a:hover{color:var(--teal);border-bottom-color:var(--teal);}

  @media(max-width:640px){
    .hero{padding:52px 0 26px;}
    .grid{grid-template-columns:1fr;}
    .controls{flex-direction:column;align-items:stretch;}
    .count{align-self:flex-end;}
  }
</style>
</head>
<body>

  <header class="hero">
    <div class="wrap">
      <div class="kicker">Personal documents · always a work in progress</div>
      <h1><em>desk</em></h1>
      <p class="lede">A small shelf of things I'm writing, learning, and keeping. <b>Search to narrow it down.</b></p>
    </div>
  </header>

  <main class="wrap">
    <div class="controls">
      <label class="search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="filter" type="text" placeholder="Filter entries…" autocomplete="off" spellcheck="false">
      </label>
      <div class="count"><b id="shown">0</b> / <span id="total">0</span> entries</div>
    </div>

    <div id="board" class="grid"><!-- cards render here --></div>
    <div id="noresults">No entries match that filter.</div>
  </main>

  <div class="footer">
    desk · <a href="https://github.com/rijan08/desk">github.com/rijan08/desk</a> · served with GitHub Pages
  </div>

<script>
  /* ──────────────────────────────────────────────────────────────
     ENTRIES — one object per doc, shown as a flat list of cards.
     The `category` is just a tag/label on the card; on disk the doc
     lives under that category folder. So `url` is:
         <category-folder>/<slug>      (lowercase, no trailing .html)
     e.g.  learning/react-native-roadmap
     accent (the tag colour): teal | amber | violet | rose
     ────────────────────────────────────────────────────────────── */
  const ENTRIES = [
    {
      category: "Learning",
      title: "React Native Mastery Roadmap",
      url: "learning/react-native-roadmap",
      desc: "A leverage-resequenced roadmap from “it works” to “I know why” — JS internals, React, RN architecture, performance, and the path to senior.",
      accent: "amber",
      tags: ["react native", "roadmap", "career"]
    },
    {
      category: "Learning",
      title: "MQTT Rider App Field Manual",
      url: "learning/mqtt-rider-app",
      desc: "Production MQTT for a React Native rider app — broker/topic/QoS model, live location, reconnection, and battery trade-offs.",
      accent: "teal",
      tags: ["mqtt", "react native", "real-time"]
    },
    // { category: "Personal", title: "…", url: "personal/…", desc: "…", accent: "violet", tags: ["…"] },
  ];

  const ACCENTS = {teal:"var(--teal)", amber:"var(--amber)", violet:"var(--violet)", rose:"var(--rose)"};
  const board = document.getElementById("board");
  const totalEl = document.getElementById("total");
  const shownEl = document.getElementById("shown");
  const noResults = document.getElementById("noresults");

  // Build the flat card list once.
  ENTRIES.forEach(e => {
    const a = document.createElement("a");
    a.className = "card";
    a.href = e.url;
    a.style.setProperty("--accent", ACCENTS[e.accent] || ACCENTS.teal);
    a.dataset.search = (e.title + " " + e.desc + " " + (e.tags||[]).join(" ") + " " + e.category).toLowerCase();
    a.innerHTML =
      '<span class="ctag">' + e.category + '</span>' +
      '<h3>' + e.title + '</h3>' +
      '<p>' + e.desc + '</p>';
    board.appendChild(a);
  });

  totalEl.textContent = ENTRIES.length;

  // Live filter + count.
  const input = document.getElementById("filter");
  function apply() {
    const q = input.value.trim().toLowerCase();
    let shown = 0;
    board.querySelectorAll(".card").forEach(card => {
      const match = !q || card.dataset.search.includes(q);
      card.style.display = match ? "" : "none";
      if (match) shown++;
    });
    shownEl.textContent = shown;
    noResults.style.display = (shown === 0 && q) ? "block" : "none";
  }
  input.addEventListener("input", apply);
  apply();
</script>
</body>
</html>
